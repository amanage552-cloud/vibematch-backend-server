name: Mobile Builds (Android + iOS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  DIST_DIR: public/downloads

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Set up Android SDK
        uses: r0adkll/setup-android@v2
        with:
          api-level: 33
          build-tools: '33.0.2'

      - name: Make gradlew executable
        run: chmod +x ./gradlew || true

      - name: Build release APK
        run: |
          if [ -f ./gradlew ]; then
            ./gradlew assembleRelease --no-daemon --stacktrace
          else
            echo 'gradlew not found; skipping Android build' && exit 0
          fi

      - name: Find APK artifact
        id: find_apk
        run: |
          set -e
          APK=$(find . -type f -name "*-release.apk" | head -n1 || true)
          if [ -z "$APK" ]; then
            echo "apk_path=" >> $GITHUB_OUTPUT
            echo "No APK found"
          else
            echo "apk_path=$APK" >> $GITHUB_OUTPUT
            echo "Found APK: $APK"
          fi

      - name: Copy APK to dist
        if: steps.find_apk.outputs.apk_path != ''
        run: |
          mkdir -p $DIST_DIR
          cp "${{ steps.find_apk.outputs.apk_path }}" "$DIST_DIR/VibeMatch.apk"

      - name: Commit APK back to repo
        if: steps.find_apk.outputs.apk_path != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $DIST_DIR/VibeMatch.apk || true
          git commit -m "chore(dist): add built VibeMatch.apk [ci skip]" || echo "no changes to commit"
          git push origin HEAD:main || echo "push failed"

  ios:
    name: Build iOS IPA (macOS)
    runs-on: macos-latest
    needs: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CocoaPods
        run: |
          gem install cocoapods -v 1.12.1 --no-document || true

      - name: Install Ruby deps (fastlane optional)
        run: |
          gem install fastlane --no-document || true

      - name: Prepare code signing (optional)
        env:
          CERT_P12_BASE64: ${{ secrets.CERT_P12_BASE64 }}
          CERT_P12_PASSWORD: ${{ secrets.CERT_P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -e
          mkdir -p build/certs
          if [ -n "$CERT_P12_BASE64" ] && [ -n "$CERT_P12_PASSWORD" ]; then
            echo "$CERT_P12_BASE64" | base64 --decode > build/certs/cert.p12
            security import build/certs/cert.p12 -P "$CERT_P12_PASSWORD" -k ~/Library/Keychains/login.keychain-db || true
          else
            echo "No iOS certificate provided; using automatic signing if available"
          fi
          if [ -n "$PROVISIONING_PROFILE_BASE64" ]; then
            echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > build/certs/profile.mobileprovision
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp build/certs/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          else
            echo "No provisioning profile provided"
          fi

      - name: Build .ipa (if Xcode project exists)
        env:
          IOS_SCHEME: ${{ secrets.IOS_SCHEME }}
          IOS_WORKSPACE: ${{ secrets.IOS_WORKSPACE }}
          IOS_PROJECT: ${{ secrets.IOS_PROJECT }}
          EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD || 'ad-hoc' }}
        run: |
          set -e
          mkdir -p build/ipa
          if [ -n "$IOS_WORKSPACE" ] && [ -n "$IOS_SCHEME" ]; then
            echo "Building workspace $IOS_WORKSPACE scheme $IOS_SCHEME"
            xcodebuild -workspace "$IOS_WORKSPACE" -scheme "$IOS_SCHEME" -configuration Release -archivePath build/VibeMatch.xcarchive archive || { echo 'archive failed' ; exit 0; }
            xcodebuild -exportArchive -archivePath build/VibeMatch.xcarchive -exportOptionsPlist -exportPath build/ipa || echo 'export failed'
          elif [ -n "$IOS_PROJECT" ] && [ -n "$IOS_SCHEME" ]; then
            echo "Building project $IOS_PROJECT scheme $IOS_SCHEME"
            xcodebuild -project "$IOS_PROJECT" -scheme "$IOS_SCHEME" -configuration Release -archivePath build/VibeMatch.xcarchive archive || { echo 'archive failed'; exit 0; }
            xcodebuild -exportArchive -archivePath build/VibeMatch.xcarchive -exportOptionsPlist -exportPath build/ipa || echo 'export failed'
          else
            echo "No iOS workspace/project/scheme provided; skipping iOS build"
          fi

      - name: Find IPA artifact
        id: find_ipa
        run: |
          set -e
          IPA=$(find build -type f -name "*.ipa" | head -n1 || true)
          if [ -z "$IPA" ]; then
            echo "ipa_path=" >> $GITHUB_OUTPUT
            echo "No IPA found"
          else
            echo "ipa_path=$IPA" >> $GITHUB_OUTPUT
            echo "Found IPA: $IPA"
          fi

      - name: Copy IPA to dist
        if: steps.find_ipa.outputs.ipa_path != ''
        run: |
          mkdir -p $DIST_DIR
          cp "${{ steps.find_ipa.outputs.ipa_path }}" "$DIST_DIR/VibeMatch.ipa"

      - name: Generate manifest.plist in dist
        if: steps.find_ipa.outputs.ipa_path != ''
        run: |
          mkdir -p $DIST_DIR
          cat > $DIST_DIR/manifest.plist <<'PL'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>items</key>
  <array>
    <dict>
      <key>assets</key>
      <array>
        <dict>
          <key>kind</key>
          <string>software-package</string>
          <key>url</key>
          <string>${{ env.SERVER_URL || '' }}/downloads/VibeMatch.ipa</string>
        </dict>
      </array>
      <key>metadata</key>
      <dict>
        <key>bundle-identifier</key>
        <string>com.vibematch.app</string>
        <key>bundle-version</key>
        <string>1.0.0</string>
        <key>kind</key>
        <string>software</string>
        <key>title</key>
        <string>VibeMatch</string>
      </dict>
    </dict>
  </array>
</dict>
</plist>
PL

      - name: Commit artifacts to repo
        if: steps.find_ipa.outputs.ipa_path != '' || steps.find_apk.outputs.apk_path != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $DIST_DIR/VibeMatch.apk $DIST_DIR/VibeMatch.ipa $DIST_DIR/manifest.plist || true
          git commit -m "chore(dist): add mobile builds (apk, ipa, manifest) [ci skip]" || echo "no changes to commit"
          git push origin HEAD:main || echo "push failed"
