<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VibeMatch Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0B0C10">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600;700&display=swap');
      :root{
        --bg:#0B0C10;
        --accent:#A3E635;
        --accent-strong:#9AE64D;
        --muted:#8A939B;
      }
      html,body{height:100%;}
      body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial; background:var(--bg); color:#E6EEF3}
      .brand{font-family:Poppins, Inter, sans-serif; font-weight:700}
      .neon{box-shadow:0 6px 20px rgba(163,230,53,0.12)}
      .glow-hover:hover{box-shadow:0 6px 30px rgba(163,230,53,0.28); transform:translateY(-3px);}
      .accent-pill{background:linear-gradient(90deg,var(--accent),var(--accent-strong)); color:#07120a}
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-sA+e2Y6b7gG1k9H4g9vS7Z5Y2bM6Q1p3bZfXg9m0h+8=" crossorigin="" />
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      #map { width: 100%; height: 320px; border-radius: 10px; overflow: hidden; }
      .pulse-marker { width: 18px; height: 18px; border-radius: 50%; background: #A3E635; box-shadow: 0 0 12px rgba(163,230,53,0.9); position: relative; }
      .pulse-marker::after { content: ''; position: absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:18px; height:18px; border-radius:50%; background: rgba(163,230,53,0.12); animation: pulse 1.6s infinite; }
      @keyframes pulse { 0% { transform: translate(-50%,-50%) scale(1); opacity: 0.9 } 70% { transform: translate(-50%,-50%) scale(2.6); opacity: 0 } 100% { opacity: 0 } }
    </style>
  </head>
  <body class="antialiased">
    <div class="min-h-screen flex">
      <!-- Left fixed navbar with brand header -->
      <aside class="w-52 p-4 bg-[#050607] border-r border-gray-800 flex flex-col gap-4">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 flex items-center justify-center rounded-lg bg-gradient-to-br from-[#091015] to-[#0b0c10] neon">
            <img src="/assets/logo.svg" alt="VibeMatch logo" class="w-9 h-9" />
          </div>
          <div class="brand text-lg text-[#A3E635]">VibeMatch</div>
        </div>

        <nav class="flex flex-col gap-2">
          <button class="p-3 rounded-lg text-[#A3E635] text-left">🏠 Home</button>
          <button class="p-3 rounded-lg text-[#A3E635] text-left">🔍 Explore</button>
          <button class="p-3 rounded-lg text-[#A3E635] text-left">💬 Messages</button>
        </nav>

        <div style="flex:1"></div>
        <div class="pt-2">
          <button class="p-3 rounded-lg text-[#A3E635]">⚙ Settings</button>
        </div>
      </aside>

      <!-- Center area with stories and profile player -->
      <main class="flex-1 flex flex-col">
        <div class="flex items-center gap-4 p-4 border-b border-gray-800">
          <h3 class="text-sm font-bold text-[#A3E635]">Stories</h3>
          <div id="storiesRow" class="flex gap-3 overflow-x-auto py-2"></div>
          <div style="flex:1"></div>
          <div>
            <button id="createPostBtn" class="px-3 py-2 rounded bg-[#A3E635] text-black font-bold">Create Post</button>
          </div>
        </div>

        <div class="flex-1 flex items-center justify-center bg-black">
          <div style="width:90%;height:85%;position:relative">
            <video id="profilePlayer" class="w-full h-full rounded-lg bg-black object-cover" autoplay muted loop playsinline></video>
            <canvas id="glCanvas" style="position:absolute;inset:0;pointer-events:none;z-index:0"></canvas>
            <canvas id="overlayCanvas" style="position:absolute;inset:0;pointer-events:none;z-index:1"></canvas>
            <div style="position:absolute;left:18px;bottom:18px;color:#E9FCEB">
              <div id="profileName" style="font-weight:800;font-size:20px">Guest</div>
              <div style="margin-top:6px">Age <span id="profileAge">—</span> <span id="profileMatch" class="px-3 py-1 rounded-full text-black" style="background:linear-gradient(90deg,#A3E635,#9AE64D);font-weight:800">—%</span></div>
            </div>
          </div>
        </div>
      </main>

      <!-- Right column compact -->
      <aside class="w-80 p-4 bg-[#06070a] border-l border-gray-800">
        <h4 class="text-sm font-bold text-[#A3E635]">Nearby</h4>
        <div id="map" class="mt-4"></div>
      </aside>
    </div>

    <!-- Create Post Modal -->
    <div id="createPostModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:80;align-items:center;justify-content:center;">
      <div style="background:linear-gradient(180deg,#071018,#000);padding:18px;border-radius:12px;min-width:360px;border:1px solid rgba(255,255,255,0.04)">
        <h3 style="font-weight:800;color:#E6FCD9;margin-bottom:8px">Create Post</h3>
        <input id="postImageInput" type="file" accept="image/*" style="display:block;margin-bottom:8px" />
        <textarea id="postCaption" placeholder="Write a caption..." style="width:100%;min-height:80px;padding:8px;border-radius:8px;background:#071018;border:1px solid rgba(255,255,255,0.03);color:#E6EEF3"></textarea>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
          <button id="cancelPost" class="px-3 py-2 rounded border">Cancel</button>
          <button id="submitPost" class="px-3 py-2 rounded bg-[#A3E635] text-black font-bold">Post</button>
        </div>
      </div>
    </div>

    <!-- Mobile Bottom Nav -->
    <nav class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[92%] md:hidden bg-gray-900/80 border border-gray-800 rounded-2xl p-2 flex justify-between px-4">
      <button id="bottomHomeBtn" class="text-[#A3E635]">🏠</button>
      <button id="bottomDiscoverBtn" class="text-gray-300">🗺️</button>
      <button id="bottomCenterBtn" class="bg-[#A3E635] text-black px-4 py-2 rounded-xl">＋</button>
      <button id="bottomMessagesBtn" class="text-gray-300">💬</button>
      <button id="bottomProfileBtn" class="text-gray-300">👤</button>
    </nav>

    <!-- Media Upload Modal (shared) -->
    <div id="mediaUploadModal" style="display:none;position:fixed;inset:0;background:rgba(2,2,2,0.7);z-index:80;align-items:center;justify-content:center;">
      <div style="width:92%;max-width:520px;background:linear-gradient(180deg,#071018,#000);padding:16px;border-radius:12px;border:1px solid rgba(255,255,255,0.04)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="font-weight:800;color:#E6FCD9">Create</div>
          <button id="closeUploadModal" style="background:transparent;border:0;color:#9AB39A;font-weight:700">Close</button>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button class="uploadTab" data-tab="snap" style="flex:1;padding:8px;border-radius:8px;background:rgba(255,255,255,0.02)">Snap</button>
          <button class="uploadTab" data-tab="reel" style="flex:1;padding:8px;border-radius:8px;background:rgba(255,255,255,0.02)">Reel</button>
          <button class="uploadTab" data-tab="post" style="flex:1;padding:8px;border-radius:8px;background:rgba(255,255,255,0.02)">Post</button>
        </div>
        <div id="uploadSnap" style="display:none">
          <input id="snapImageInput" type="file" accept="image/*" />
          <div style="margin-top:8px"><button id="submitSnapBtn" class="px-4 py-2 rounded bg-[#A3E635] text-black">Upload Snap</button></div>
        </div>
        <div id="uploadReel" style="display:none">
          <input id="reelVideoInput" type="file" accept="video/mp4,video/webm" />
          <div style="margin-top:8px"><input id="reelCaption" placeholder="Caption (optional)" style="width:100%;padding:8px;border-radius:8px;background:#071018;border:1px solid rgba(255,255,255,0.03);color:#E6EEF3"/></div>
          <div style="margin-top:8px"><button id="submitReelBtn" class="px-4 py-2 rounded bg-[#A3E635] text-black">Upload Reel</button></div>
        </div>
        <div id="uploadPost" style="display:none">
          <input id="postImageInput2" type="file" accept="image/*" />
          <div style="margin-top:8px"><textarea id="postCaption2" placeholder="Write a caption..." style="width:100%;min-height:80px;padding:8px;border-radius:8px;background:#071018;border:1px solid rgba(255,255,255,0.03);color:#E6EEF3"></textarea></div>
          <div style="margin-top:8px"><button id="submitPostBtn2" class="px-4 py-2 rounded bg-[#A3E635] text-black">Create Post</button></div>
        </div>
      </div>
    </div>

    <script src="/dashboard.js"></script>

  </body>
</html>
