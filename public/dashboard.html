<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VibeMatch Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600;700&display=swap');
      :root{
        --bg:#0B0C10;
        --accent:#A3E635;
        --accent-strong:#9AE64D;
        --muted:#8A939B;
      }
      html,body{height:100%;}
      body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial; background:var(--bg); color:#E6EEF3}
      .brand{font-family:Poppins, Inter, sans-serif; font-weight:700}
      .neon{box-shadow:0 6px 20px rgba(163,230,53,0.12)}
      .glow-hover:hover{box-shadow:0 6px 30px rgba(163,230,53,0.28); transform:translateY(-3px);}
      .accent-pill{background:linear-gradient(90deg,var(--accent),var(--accent-strong)); color:#07120a}
    </style>
  </head>
  <body class="antialiased">
    <div class="min-h-screen flex">
      <!-- Left fixed navbar with brand header -->
      <aside class="w-52 p-4 bg-[#050607] border-r border-gray-800 flex flex-col gap-4">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 flex items-center justify-center rounded-lg bg-gradient-to-br from-[#091015] to-[#0b0c10] neon">
            <!-- geometric placeholder icon -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect x="3" y="3" width="18" height="18" rx="4" stroke="#A3E635" stroke-opacity="0.9" stroke-width="1.5" />
              <path d="M6 12 L12 6 L18 12 L12 18 Z" fill="#A3E635" fill-opacity="0.06" />
              <path d="M9 12 L12 9 L15 12 L12 15 Z" fill="#A3E635" />
            </svg>
          </div>
          <div class="brand text-lg text-[#A3E635]">VibeMatch</div>
        </div>

        <nav class="flex flex-col gap-2">
          <button class="p-3 rounded-lg text-[#A3E635] text-left">🏠 Home</button>
          <button class="p-3 rounded-lg text-[#A3E635] text-left">🔍 Explore</button>
          <button class="p-3 rounded-lg text-[#A3E635] text-left">💬 Messages</button>
        </nav>

        <div style="flex:1"></div>
        <div class="pt-2">
          <button class="p-3 rounded-lg text-[#A3E635]">⚙ Settings</button>
        </div>
      </aside>

      <!-- Center area with stories and profile player -->
      <main class="flex-1 flex flex-col">
        <div class="flex items-center gap-4 p-4 border-b border-gray-800">
          <h3 class="text-sm font-bold text-[#A3E635]">Stories</h3>
          <div id="storiesRow" class="flex gap-3 overflow-x-auto py-2"></div>
        </div>

        <div class="flex-1 flex items-center justify-center bg-black">
          <div style="width:90%;height:85%;position:relative">
            <video id="profilePlayer" class="w-full h-full rounded-lg bg-black object-cover" autoplay muted loop playsinline></video>
            <canvas id="glCanvas" style="position:absolute;inset:0;pointer-events:none;z-index:0"></canvas>
            <canvas id="overlayCanvas" style="position:absolute;inset:0;pointer-events:none;z-index:1"></canvas>
            <div style="position:absolute;left:18px;bottom:18px;color:#E9FCEB">
              <div id="profileName" style="font-weight:800;font-size:20px">Guest</div>
              <div style="margin-top:6px">Age <span id="profileAge">—</span> <span id="profileMatch" class="px-3 py-1 rounded-full text-black" style="background:linear-gradient(90deg,#A3E635,#9AE64D);font-weight:800">—%</span></div>
            </div>
          </div>
        </div>
      </main>

      <!-- Right column compact -->
      <aside class="w-80 p-4 bg-[#06070a] border-l border-gray-800">
        <h4 class="text-sm font-bold text-[#A3E635]">Nearby</h4>
        <div id="nearbyList" class="mt-4 space-y-3">Loading…</div>
      </aside>
    </div>

    <!-- Mobile Bottom Nav -->
    <nav class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[92%] md:hidden bg-gray-900/80 border border-gray-800 rounded-2xl p-2 flex justify-between px-4">
      <button class="text-gray-300">Home</button>
      <button class="text-gray-300">Search</button>
      <button class="bg-green-400 text-black px-4 py-2 rounded-xl">+</button>
      <button class="text-gray-300">Messages</button>
      <button class="text-gray-300">Profile</button>
    </nav>

    <script src="/dashboard.js"></script>

  </body>
</html>
