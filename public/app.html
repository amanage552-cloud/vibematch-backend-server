<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>VibeMatch — App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600;700&display=swap');
      :root{--bg:#07080a;--panel:#081018;--accent:#A3E635;--accent-strong:#9AE64D}
      body{margin:0;background:var(--bg);color:#E6EEF3;font-family:Inter,system-ui}
      .brand{font-family:Poppins,Inter,sans-serif;font-weight:700;color:var(--accent)}
      /* Layout */
      .app-shell{display:flex;height:100vh;overflow:hidden}
      .left-nav{width:84px;background:linear-gradient(180deg,#050607,#071018);border-right:1px solid rgba(255,255,255,0.03);display:flex;flex-direction:column;align-items:center;padding:12px;gap:12px}
      .nav-icon{width:56px;height:56px;border-radius:12px;display:grid;place-items:center;background:transparent;color:var(--accent);border:1px solid rgba(163,230,53,0.06)}
      .main-col{flex:1;display:flex;flex-direction:column}
      .top-stories{height:120px;background:transparent;display:flex;align-items:center;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,0.02);gap:12px;overflow:hidden}
      .stories-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px}
      .story-item{min-width:96px;height:96px;border-radius:14px;overflow:hidden;flex:0 0 auto;background:#000;border:1px solid rgba(255,255,255,0.03);display:grid;place-items:center}
      .story-item video{width:100%;height:100%;object-fit:cover}
      .content-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
      .profile-player{width:100%;height:100%;object-fit:cover}
      .profile-overlay{position:absolute;left:20px;bottom:40px;z-index:30;color:#E9FCEB}
      .profile-overlay .name{font-weight:800;font-size:22px}
      .match-pill{display:inline-block;padding:6px 10px;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--accent-strong));color:#04120a;font-weight:800;margin-left:8px}
      /* Right column (optional) */
      .right-col{width:320px;background:linear-gradient(180deg,#06070a,#071018);border-left:1px solid rgba(255,255,255,0.02);padding:12px;overflow:auto}

      /* Responsive mobile: collapse sidebar and right col, stories become sticky top */
      @media(max-width:900px){
        .app-shell{flex-direction:column}
        .left-nav{display:flex;flex-direction:row;width:100%;height:64px;justify-content:center}
        .top-stories{height:94px}
        .right-col{display:none}
      }

      /* Auth overlay */
      .login-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,2,2,0.6);z-index:50}
      .auth-card{background:linear-gradient(180deg,#071018,#000);padding:20px;border-radius:14px;border:1px solid rgba(255,255,255,0.04);min-width:320px}
      .auth-row{display:flex;gap:8px;margin-top:8px}
    </style>
  </head>
  <body>
    <div class="app-shell">
      <nav class="left-nav" aria-label="Main">
        <div class="flex items-center gap-3 mb-2">
          <div class="w-12 h-12 flex items-center justify-center rounded-lg bg-gradient-to-br from-[#091015] to-[#0b0c10] neon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect x="3" y="3" width="18" height="18" rx="4" stroke="#A3E635" stroke-opacity="0.9" stroke-width="1.5" />
              <path d="M6 12 L12 6 L18 12 L12 18 Z" fill="#A3E635" fill-opacity="0.06" />
              <path d="M9 12 L12 9 L15 12 L12 15 Z" fill="#A3E635" />
            </svg>
          </div>
          <div class="brand text-lg">VibeMatch</div>
        </div>

        <div class="nav-icon">🏠</div>
        <div class="nav-icon">★</div>
        <div class="nav-icon">⚙</div>
        <div style="flex:1"></div>
        <div id="hamburger" class="nav-icon">☰</div>
      </nav>

      <main class="main-col">
        <div class="top-stories">
          <div style="font-weight:800;color:var(--accent);margin-right:12px">Stories</div>
          <div class="stories-row" id="storiesRow">
            <!-- story items populated by JS; clicking plays temporary video -->
          </div>
        </div>

        <div class="content-area">
          <video id="profilePlayer" class="profile-player" autoplay muted loop playsinline></video>
          <canvas id="glCanvas" style="position:absolute;inset:0;pointer-events:none;z-index:0"></canvas>
          <canvas id="overlayCanvas" style="position:absolute;inset:0;pointer-events:none;z-index:1"></canvas>

          <div class="profile-overlay" id="profileOverlay">
            <div class="name" id="profileName">Guest</div>
            <div class="meta" style="margin-top:6px">Age <span id="profileAge">—</span> <span class="match-pill" id="profileMatch">—%</span></div>
          </div>
        </div>
      </main>

      <aside class="right-col">
        <div style="font-weight:800;color:var(--accent);margin-bottom:8px">Nearby</div>
        <div id="nearbyList">Loading…</div>
      </aside>
    </div>

    <!-- Login overlay with Phone+Password and Google OAuth -->
    <div id="loginOverlay" class="login-overlay" style="display:none">
      <div class="auth-card">
        <h3 class="text-lg font-bold mb-2">Sign In</h3>
        <div id="phoneLogin">
          <input id="phoneInput" placeholder="+1 555 555 5555" class="w-full p-2 mb-2 rounded" />
          <input id="passwordInput" placeholder="Password" type="password" class="w-full p-2 mb-2 rounded" />
          <div class="auth-row"><button id="loginBtn" class="px-3 py-2 bg-[#A3E635] rounded">Sign In</button><button id="signupBtn" class="px-3 py-2 border rounded">Sign Up</button></div>
        </div>

        <hr style="margin:12px 0;border-color:rgba(255,255,255,0.03)" />

        <div style="text-align:center">
          <div style="font-size:13px;color:#cfeeb2;margin-bottom:8px">Or continue with</div>
          <button id="googleBtn" class="px-4 py-2 rounded" style="background:#fff;color:#111;font-weight:700">Sign in with Google</button>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="/filters.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
