<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>VibeMatch — App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0B0C10">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600;700&display=swap');
      :root{--bg:#07080a;--panel:#081018;--accent:#A3E635;--accent-strong:#9AE64D}
      body{margin:0;background:var(--bg);color:#E6EEF3;font-family:Inter,system-ui}
      .brand{font-family:Poppins,Inter,sans-serif;font-weight:700;color:var(--accent)}
      /* Layout */
      .app-shell{display:flex;height:100vh;overflow:hidden}
      .left-nav{width:84px;background:linear-gradient(180deg,#050607,#071018);border-right:1px solid rgba(255,255,255,0.03);display:flex;flex-direction:column;align-items:center;padding:12px;gap:12px}
      .nav-icon{width:56px;height:56px;border-radius:12px;display:grid;place-items:center;background:transparent;color:var(--accent);border:1px solid rgba(163,230,53,0.06)}
      .main-col{flex:1;display:flex;flex-direction:column}
      .top-stories{height:120px;background:transparent;display:flex;align-items:center;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,0.02);gap:12px;overflow:hidden}
      .stories-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px}
      .story-item{min-width:96px;height:96px;border-radius:14px;overflow:hidden;flex:0 0 auto;background:#000;border:1px solid rgba(255,255,255,0.03);display:grid;place-items:center}
      .story-item video{width:100%;height:100%;object-fit:cover}
      .content-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
      .profile-player{width:100%;height:100%;object-fit:cover}
      .profile-overlay{position:absolute;left:20px;bottom:40px;z-index:30;color:#E9FCEB}
      .profile-overlay .name{font-weight:800;font-size:22px}
      .match-pill{display:inline-block;padding:6px 10px;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--accent-strong));color:#04120a;font-weight:800;margin-left:8px}
      /* Right column (optional) */
      .right-col{width:320px;background:linear-gradient(180deg,#06070a,#071018);border-left:1px solid rgba(255,255,255,0.02);padding:12px;overflow:auto}

      /* Responsive mobile: collapse sidebar and right col, stories become sticky top */
      @media(max-width:900px){
        .app-shell{flex-direction:column}
        .left-nav{display:flex;flex-direction:row;width:100%;height:64px;justify-content:center}
        .top-stories{height:94px}
        .right-col{display:none}
      }

      /* Auth overlay */
      .login-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,2,2,0.6);z-index:50}
      .auth-card{background:linear-gradient(180deg,#071018,#000);padding:20px;border-radius:14px;border:1px solid rgba(255,255,255,0.04);min-width:320px}
      .auth-row{display:flex;gap:8px;margin-top:8px}
    </style>
  </head>
  <body>
    <div class="app-shell">
      <nav class="left-nav" aria-label="Main">
        <div class="flex items-center gap-3 mb-2">
          <div class="w-12 h-12 flex items-center justify-center rounded-lg bg-gradient-to-br from-[#091015] to-[#0b0c10] neon">
            <img src="/assets/logo.svg" alt="VibeMatch logo" class="w-9 h-9" />
          </div>
          <div class="brand text-lg">VibeMatch</div>
        </div>

        <div class="nav-icon" id="homeBtn">🏠</div>
        <div class="nav-icon" id="reelsBtn">🎞️</div>
        <div class="nav-icon">★</div>
        <div class="nav-icon">⚙</div>
        <div style="flex:1"></div>
        <div id="hamburger" class="nav-icon">☰</div>
      </nav>

      <!-- Reels viewer overlay -->
      <div id="reelsViewer" style="display:none;position:fixed;inset:0;background:#000;z-index:80;">
        <div style="position:absolute;top:14px;left:14px;z-index:90"><button id="closeReels" class="px-3 py-2 rounded bg-black/60 text-[#A3E635]">Close</button></div>
        <div id="reelsUploader" style="position:absolute;top:14px;right:14px;z-index:90">
          <input id="reelFile" type="file" accept="video/mp4,video/webm" style="display:none" />
          <button id="uploadReelBtn" class="px-3 py-2 rounded bg-[#A3E635] text-black">Upload Reel</button>
        </div>
        <div id="reelsContainer" style="height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;display:flex;flex-direction:column;">
          <!-- vertical reels appended here -->
        </div>
      </div>

      <main class="main-col">
        <div class="top-stories">
          <div style="font-weight:800;color:var(--accent);margin-right:12px">Stories</div>
          <div class="stories-row" id="storiesRow">
            <!-- story items populated by JS; clicking plays temporary video -->
          </div>
        </div>

        <div class="content-area">
          <video id="profilePlayer" class="profile-player" autoplay muted loop playsinline></video>
          <canvas id="glCanvas" style="position:absolute;inset:0;pointer-events:none;z-index:0"></canvas>
          <canvas id="overlayCanvas" style="position:absolute;inset:0;pointer-events:none;z-index:1"></canvas>

          <div class="profile-overlay" id="profileOverlay">
            <div class="name" id="profileName">Guest</div>
            <div class="meta" style="margin-top:6px">Age <span id="profileAge">—</span> <span class="match-pill" id="profileMatch">—%</span></div>
          </div>
        </div>
      </main>

      <aside class="right-col">
        <div style="font-weight:800;color:var(--accent);margin-bottom:8px">Nearby</div>
        <div id="nearbyList">Loading…</div>
      </aside>
    </div>

    <!-- Login overlay with Phone+Password and Google OAuth -->
    <div id="loginOverlay" class="login-overlay" style="display:none">
      <div class="auth-card">
        <h3 class="text-lg font-bold mb-2">Sign In</h3>
        <div id="phoneLogin">
          <input id="phoneInput" placeholder="+1 555 555 5555" class="w-full p-2 mb-2 rounded" />
          <input id="passwordInput" placeholder="Password" type="password" class="w-full p-2 mb-2 rounded" />
          <div class="auth-row"><button id="loginBtn" class="px-3 py-2 bg-[#A3E635] rounded">Sign In</button><button id="signupBtn" class="px-3 py-2 border rounded">Sign Up</button></div>
        </div>

        <hr style="margin:12px 0;border-color:rgba(255,255,255,0.03)" />

        <div style="text-align:center">
          <div style="font-size:13px;color:#cfeeb2;margin-bottom:8px">Or continue with</div>
          <button id="googleBtn" class="px-4 py-2 rounded" style="background:#fff;color:#111;font-weight:700">Sign in with Google</button>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="/filters.js"></script>
    <script src="/app.js"></script>
    
    <!-- Bottom Navigation Dock -->
    <nav id="bottomDock" class="fixed left-1/2 -translate-x-1/2 bottom-4 w-[92%] max-w-3xl bg-[#071018] border border-gray-800 rounded-2xl p-2 flex justify-between items-center z-60" style="box-shadow:0 8px 30px rgba(10,11,12,0.6);">
      <button id="bottomHomeBtn" class="flex-1 text-center py-2 text-[#A3E635]">🏠</button>
      <button id="bottomDiscoverBtn" class="flex-1 text-center py-2 text-gray-300">🗺️</button>
      <button id="bottomCenterBtn" class="flex-1 text-center py-2" style="background:linear-gradient(90deg,#A3E635,#9AE64D);border-radius:16px;margin:0 8px;padding:10px 12px;color:#07120a;font-weight:800">＋</button>
      <button id="bottomMessagesBtn" class="flex-1 text-center py-2 text-gray-300">💬</button>
      <button id="bottomProfileBtn" class="flex-1 text-center py-2 text-gray-300">👤</button>
    </nav>

    <!-- Media Upload Modal (Snaps / Reels / Posts) -->
    <div id="mediaUploadModal" style="display:none;position:fixed;inset:0;background:rgba(2,2,2,0.7);z-index:90;align-items:center;justify-content:center;">
      <div style="width:92%;max-width:520px;background:linear-gradient(180deg,#071018,#000);padding:16px;border-radius:12px;border:1px solid rgba(255,255,255,0.04)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="font-weight:800;color:#E6FCD9">Create</div>
          <button id="closeUploadModal" style="background:transparent;border:0;color:#9AB39A;font-weight:700">Close</button>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button class="uploadTab" data-tab="snap" style="flex:1;padding:8px;border-radius:8px;background:rgba(255,255,255,0.02)">Snap</button>
          <button class="uploadTab" data-tab="reel" style="flex:1;padding:8px;border-radius:8px;background:rgba(255,255,255,0.02)">Reel</button>
          <button class="uploadTab" data-tab="post" style="flex:1;padding:8px;border-radius:8px;background:rgba(255,255,255,0.02)">Post</button>
        </div>
        <div id="uploadSnap" style="display:none">
          <input id="snapImageInput" type="file" accept="image/*" />
          <div style="margin-top:8px"><button id="submitSnapBtn" class="px-4 py-2 rounded bg-[#A3E635] text-black">Upload Snap</button></div>
        </div>
        <div id="uploadReel" style="display:none">
          <input id="reelVideoInput" type="file" accept="video/mp4,video/webm" />
          <div style="margin-top:8px"><input id="reelCaption" placeholder="Caption (optional)" style="width:100%;padding:8px;border-radius:8px;background:#071018;border:1px solid rgba(255,255,255,0.03);color:#E6EEF3"/></div>
          <div style="margin-top:8px"><button id="submitReelBtn" class="px-4 py-2 rounded bg-[#A3E635] text-black">Upload Reel</button></div>
        </div>
        <div id="uploadPost" style="display:none">
          <input id="postImageInput2" type="file" accept="image/*" />
          <div style="margin-top:8px"><textarea id="postCaption2" placeholder="Write a caption..." style="width:100%;min-height:80px;padding:8px;border-radius:8px;background:#071018;border:1px solid rgba(255,255,255,0.03);color:#E6EEF3"></textarea></div>
          <div style="margin-top:8px"><button id="submitPostBtn2" class="px-4 py-2 rounded bg-[#A3E635] text-black">Create Post</button></div>
        </div>
      </div>
    </div>
  </body>
</html>
