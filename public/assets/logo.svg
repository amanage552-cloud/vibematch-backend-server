<?xml version="1.0" encoding="UTF-8"?>
<!-- VibeMatch minimal V+M loop logo (Option B, neon) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-labelledby="vm_logo_title vm_logo_desc" preserveAspectRatio="xMidYMid meet">
  <title id="vm_logo_title">VibeMatch logo</title>
  <desc id="vm_logo_desc">Minimal V+M loop mark in neon gradient designed for dark backgrounds.</desc>
  <defs>
    <linearGradient id="vm_grad" x1="0" x2="1">
      <stop offset="0" stop-color="#A84DFF"/>
      <stop offset="1" stop-color="#5BE0FF"/>
    </linearGradient>
    <filter id="vm_glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b" />
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- circular dark plate for contrast -->
  <circle cx="32" cy="32" r="30" fill="#06070a"/>

  <!-- neon stroke loop forming a V then M-like connection -->
  <g transform="translate(0,0)">
    <path d="M14 20 L26 44 L34 28 L42 44 L54 20" fill="none" stroke="url(#vm_grad)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#vm_glow)"/>
    <!-- small connector spark -->
    <circle cx="50" cy="14" r="2.2" fill="#A84DFF" opacity="0.95"/>
  </g>

</svg>
